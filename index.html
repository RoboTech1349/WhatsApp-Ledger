<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BNPL Pro • Living Invoice + WhatsApp Ledger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Inter', sans-serif; }
        body { background: #f4f7fc; padding: 20px; min-height: 100vh; }
        .app-container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 28px; padding: 1rem 1.8rem; margin-bottom: 1.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border: 1px solid #e2edf2; }
        .logo h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #0f3b2c, #1e7e5e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; background: #f0f4f9; color: #1e2a3a; }
        .btn-primary { background: #1e7e5e; color: white; box-shadow: 0 2px 6px rgba(30,126,94,0.2); }
        .btn-primary:hover { background: #0f5e46; transform: translateY(-1px); }
        .btn-outline { border: 1px solid #cbdbe6; background: white; }
        .btn-warning { background: #ffedd5; color: #b45309; }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .card { background: white; border-radius: 24px; padding: 1.4rem 1.8rem; box-shadow: 0 6px 14px rgba(0,0,0,0.02); border: 1px solid #e9edf2; margin-bottom: 1.5rem; }
        .badge { background: #e6f7f0; color: #1e7e5e; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
        .customer-sidebar { flex: 1.2; min-width: 270px; }
        .customer-detail { flex: 2.8; min-width: 340px; }
        .search-box { width: 100%; padding: 10px 16px; border-radius: 60px; border: 1px solid #dee4ec; margin-bottom: 16px; }
        .customer-list { max-height: 560px; overflow-y: auto; }
        .customer-item { padding: 12px 14px; border-radius: 20px; margin-bottom: 8px; background: #fefefe; border: 1px solid #edf2f8; cursor: pointer; transition: 0.1s; display: flex; justify-content: space-between; align-items: center; }
        .customer-item.active { background: #eef9f3; border-left: 4px solid #1e7e5e; font-weight: 500; }
        .customer-info { flex: 1; }
        .debt-highlight { font-weight: 700; color: #0f3b2c; font-size: 0.9rem; }
        .order-row, .payment-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f2f6; padding: 10px 0; font-size: 0.85rem; }
        .stats-grid { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: #fafdff; border-radius: 28px; padding: 10px 18px; flex: 1; text-align: center; border: 1px solid #eef2f8; }
        .gift-message, .pay-early { background: #fff2db; border-radius: 32px; padding: 8px 14px; margin-top: 10px; font-size: 0.8rem; font-weight: 500; }
        .credit-warning { background: #ffebea; color: #b91c1c; }
        .whatsapp-btn { background: #25D366; color: white; border: none; }
        .whatsapp-btn:hover { background: #128C7E; }
        hr { margin: 14px 0; }
        .flex-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        @media (max-width: 760px) { body { padding: 12px; } .card { padding: 1rem; } }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ---------- DATA ----------
    let customers = [];      // { id, name, phone, creditLimit }
    let orders = [];
    let payments = [];
    let storeWhatsAppNumber = "";  // store owner's WhatsApp number for order requests

    let adminLoggedIn = false;
    let selectedCustomerId = null;
    let currentView = "admin"; // admin | customerPortal

    // localStorage keys
    const STORAGE = {
        customers: "bnpl_customers_v4",
        orders: "bnpl_orders_v4",
        payments: "bnpl_payments_v4",
        storeNumber: "bnpl_store_whatsapp"
    };

    function loadData() {
        customers = JSON.parse(localStorage.getItem(STORAGE.customers) || "[]");
        orders = JSON.parse(localStorage.getItem(STORAGE.orders) || "[]");
        payments = JSON.parse(localStorage.getItem(STORAGE.payments) || "[]");
        storeWhatsAppNumber = localStorage.getItem(STORAGE.storeNumber) || "";
        
        if (customers.length === 0) {
            // seed demo with credit limits
            const id1 = Date.now() + 1;
            const id2 = Date.now() + 2;
            customers = [
                { id: id1, name: "Sarah's Grocery Corner", phone: "+1234567890", creditLimit: 150 },
                { id: id2, name: "Cafe Daily", phone: "+9876543210", creditLimit: 80 }
            ];
            orders = [
                { id: Date.now()+10, customerId: id1, amount: 24.50, description: "Veggies & milk", date: new Date().toISOString() },
                { id: Date.now()+11, customerId: id1, amount: 12.30, description: "Snacks", date: new Date(Date.now()-86400000).toISOString() },
                { id: Date.now()+12, customerId: id2, amount: 8.90, description: "Coffee & pastry", date: new Date().toISOString() }
            ];
            payments = [
                { id: Date.now()+20, customerId: id1, amount: 10.00, note: "Cash", date: new Date().toISOString() }
            ];
            saveAllData();
        }
    }
    
    function saveAllData() {
        localStorage.setItem(STORAGE.customers, JSON.stringify(customers));
        localStorage.setItem(STORAGE.orders, JSON.stringify(orders));
        localStorage.setItem(STORAGE.payments, JSON.stringify(payments));
        localStorage.setItem(STORAGE.storeNumber, storeWhatsAppNumber);
    }

    // helpers
    function getCustomerOrders(custId) { return orders.filter(o => o.customerId === custId).sort((a,b)=>new Date(b.date)-new Date(a.date)); }
    function getCustomerPayments(custId) { return payments.filter(p => p.customerId === custId).sort((a,b)=>new Date(b.date)-new Date(a.date)); }
    function getTotalDebt(custId) {
        const totalOrders = getCustomerOrders(custId).reduce((s,o)=>s+o.amount,0);
        const totalPaid = getCustomerPayments(custId).reduce((s,p)=>s+p.amount,0);
        return Math.max(0, totalOrders - totalPaid);
    }
    function getOrderCount(custId) { return getCustomerOrders(custId).length; }
    function getCustomerCreditLimit(custId) { const c = customers.find(c => c.id === custId); return c ? c.creditLimit : 100; }
    function isCreditLimitReached(custId) { const debt = getTotalDebt(custId); const limit = getCustomerCreditLimit(custId); return debt >= limit; }
    function getRemainingCredit(custId) { const limit = getCustomerCreditLimit(custId); const debt = getTotalDebt(custId); return Math.max(0, limit - debt); }

    // add order with credit limit check
    function addOrder(custId, amount, description) {
        if (!custId || isNaN(amount) || amount <= 0) return false;
        const currentDebt = getTotalDebt(custId);
        const limit = getCustomerCreditLimit(custId);
        if (currentDebt + amount > limit) {
            alert(`❌ Credit limit exceeded! Current debt: $${currentDebt.toFixed(2)} | Limit: $${limit.toFixed(2)}\nCannot add $${amount}. Please collect payment first.`);
            return false;
        }
        const newOrder = { id: Date.now(), customerId: custId, amount: parseFloat(amount), description: description.trim() || "WhatsApp order", date: new Date().toISOString() };
        orders.push(newOrder);
        saveAllData();
        return true;
    }

    function addPayment(custId, amount, note) {
        if (!custId || isNaN(amount) || amount <= 0) return false;
        const currentDebt = getTotalDebt(custId);
        if (amount > currentDebt) { alert(`Payment cannot exceed current debt ($${currentDebt.toFixed(2)})`); return false; }
        payments.push({ id: Date.now(), customerId: custId, amount: parseFloat(amount), note: note.trim() || "payment", date: new Date().toISOString() });
        saveAllData();
        return true;
    }

    function deleteOrder(orderId, custId) { if(confirm("Delete order?")) { orders = orders.filter(o=> o.id !== orderId); saveAllData(); return true; } return false; }
    function deletePayment(paymentId) { if(confirm("Delete payment?")) { payments = payments.filter(p=> p.id !== paymentId); saveAllData(); return true; } return false; }
    
    function addCustomer(name, phone, creditLimit=100) { 
        if(!name.trim()) return false; 
        const newPhone = phone ? phone.trim() : "";
        // optional duplicate check warning but allow
        if(newPhone && customers.some(c => c.phone === newPhone)) {
            if(!confirm("Phone number already exists. Continue anyway?")) return false;
        }
        customers.push({ id: Date.now(), name: name.trim(), phone: newPhone, creditLimit: parseFloat(creditLimit) || 100 }); 
        saveAllData(); 
        return true; 
    }
    
    function updateCustomer(custId, newName, newPhone, newLimit) {
        const index = customers.findIndex(c => c.id === custId);
        if(index !== -1) {
            customers[index].name = newName.trim();
            customers[index].phone = newPhone ? newPhone.trim() : "";
            customers[index].creditLimit = parseFloat(newLimit) || 100;
            saveAllData();
            return true;
        }
        return false;
    }

    function deleteCustomer(custId) { 
        if(confirm("Delete customer and all orders/payments?")) { 
            customers = customers.filter(c=> c.id !== custId); 
            orders = orders.filter(o=> o.customerId !== custId); 
            payments = payments.filter(p=> p.customerId !== custId); 
            if(selectedCustomerId === custId) selectedCustomerId = null; 
            saveAllData(); 
            return true; 
        } 
        return false; 
    }
    
    // ---------- PDF INVOICE ----------
    async function generatePDFInvoice(customer) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const ordersList = getCustomerOrders(customer.id);
        const paymentsList = getCustomerPayments(customer.id);
        const debt = getTotalDebt(customer.id);
        const limit = customer.creditLimit;
        const remaining = getRemainingCredit(customer.id);
        
        doc.setFontSize(18); doc.text("📄 LIVING INVOICE - BNPL STATEMENT", 14, 20);
        doc.setFontSize(12); doc.text(`Customer: ${customer.name}`, 14, 32);
        doc.text(`Phone: ${customer.phone || "—"}`, 14, 40);
        doc.text(`Credit Limit: $${limit.toFixed(2)} | Remaining: $${remaining.toFixed(2)} | Current Due: $${debt.toFixed(2)}`, 14, 48);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 56);
        
        const orderRows = ordersList.map(o => [new Date(o.date).toLocaleDateString(), o.description, `$${o.amount.toFixed(2)}`]);
        doc.autoTable({ startY: 68, head: [["Date", "Item / Description", "Amount"]], body: orderRows, theme: 'striped', headStyles: { fillColor: [30,126,94] } });
        let finalY = doc.lastAutoTable.finalY + 8;
        const paymentRows = paymentsList.map(p => [new Date(p.date).toLocaleDateString(), p.note, `$${p.amount.toFixed(2)}`]);
        if(paymentRows.length) {
            doc.autoTable({ startY: finalY, head: [["Date", "Payment Method / Note", "Amount Paid"]], body: paymentRows, theme: 'plain', headStyles: { fillColor: [100,116,139] } });
            finalY = doc.lastAutoTable.finalY + 8;
        }
        doc.setFontSize(11); doc.text(`🔁 TOTAL OUTSTANDING BALANCE: $${debt.toFixed(2)}`, 14, finalY+4);
        if(debt === 0) doc.text("✅ Fully paid – thank you!", 14, finalY+12);
        else doc.text("💡 Pay early to free up credit for future orders.", 14, finalY+12);
        doc.save(`${customer.name.replace(/\s/g,'_')}_invoice.pdf`);
    }

    // Excel (CSV) export
    function exportCustomerExcel(customer) {
        const ordersList = getCustomerOrders(customer.id);
        const paymentsList = getCustomerPayments(customer.id);
        let csvRows = [["INVOICE TYPE", "DATE", "DESCRIPTION/NOTE", "AMOUNT (USD)"]];
        csvRows.push(["CUSTOMER", customer.name, customer.phone, ""]);
        csvRows.push(["CREDIT LIMIT", `$${customer.creditLimit}`, "CURRENT DEBT", `$${getTotalDebt(customer.id)}`]);
        csvRows.push([]);
        csvRows.push(["ORDERS", "DATE", "ITEM", "AMOUNT"]);
        ordersList.forEach(o => { csvRows.push(["ORDER", new Date(o.date).toLocaleString(), o.description, o.amount.toFixed(2)]); });
        csvRows.push([]);
        csvRows.push(["PAYMENTS", "DATE", "NOTE", "AMOUNT"]);
        paymentsList.forEach(p => { csvRows.push(["PAYMENT", new Date(p.date).toLocaleString(), p.note, p.amount.toFixed(2)]); });
        csvRows.push([]);
        csvRows.push(["TOTAL DUE", "", "", getTotalDebt(customer.id).toFixed(2)]);
        const csvContent = csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob([csvContent], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", `${customer.name}_ledger.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // Send invoice summary via WhatsApp to customer (uses customer's phone)
    function shareInvoiceViaWhatsApp(customer) {
        if(!customer.phone) { alert("Customer has no phone number. Please edit customer to add phone."); return; }
        const debt = getTotalDebt(customer.id);
        const limit = customer.creditLimit;
        const remaining = getRemainingCredit(customer.id);
        const message = `📄 *LIVING INVOICE UPDATE* for ${customer.name}%0A💵 Current Due: $${debt.toFixed(2)}%0A💰 Credit Limit: $${limit.toFixed(2)} | Remaining: $${remaining.toFixed(2)}%0A📅 Last orders: ${getCustomerOrders(customer.id).slice(0,2).map(o=>o.description).join(', ')}%0A🔗 View full history & pay: ${window.location.href}?phone=${encodeURIComponent(customer.phone)}%0A✅ Pay early to unlock more credit.`;
        const waUrl = `https://wa.me/${customer.phone.replace(/\D/g, '')}?text=${message}`;
        window.open(waUrl, '_blank');
    }

    // Send real-time portal link (pinned, always updated invoice)
    function sendPortalLink(customer) {
        if(!customer.phone) { alert("Customer has no phone number. Please edit customer to add phone."); return; }
        const portalUrl = `${window.location.href.split('?')[0]}?phone=${encodeURIComponent(customer.phone)}`;
        const message = `🔗 *Your Live Invoice Portal* – Bookmark this link!%0AIt always shows your current balance, orders and payments, updated instantly by the store.%0A👉 ${portalUrl}%0A📊 Current debt: $${getTotalDebt(customer.id).toFixed(2)} / Limit $${customer.creditLimit}`;
        const waUrl = `https://wa.me/${customer.phone.replace(/\D/g, '')}?text=${message}`;
        window.open(waUrl, '_blank');
    }

    // Quick WhatsApp Order: sends order request to store owner (configurable number)
    function quickWhatsAppOrder(customer) {
        if(!storeWhatsAppNumber) {
            alert("⚠️ Store owner's WhatsApp number not set. Please go to Settings (⚙️) and set your number first.");
            return;
        }
        const storeNumberClean = storeWhatsAppNumber.replace(/\D/g, '');
        if(!storeNumberClean) { alert("Invalid store number. Please update in Settings."); return; }
        const message = `🛍️ *NEW ORDER REQUEST* (Credit account)%0A👤 Customer: ${customer.name}%0A📞 Phone: ${customer.phone || 'Not provided'}%0A💰 Current Debt: $${getTotalDebt(customer.id).toFixed(2)} / Limit $${customer.creditLimit}%0A%0A📦 *Add items below:*%0A- Item: ______  Price: $______%0A- Item: ______  Price: $______%0A%0A(Store owner: add order in admin panel)`;
        window.open(`https://wa.me/${storeNumberClean}?text=${encodeURIComponent(message)}`, '_blank');
    }

    // ----- RENDER LOGIC -----
    const root = document.getElementById("appRoot");
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function renderAdminLogin() {
        return `<div class="card" style="max-width:450px; margin:40px auto;text-align:center;"><h2>🔐 Store Owner Access</h2><p style="margin-bottom:20px;">Manage BNPL orders, credit limits & living invoices</p><input type="password" id="adminPassword" placeholder="Enter password" class="search-box"><button class="btn btn-primary" id="loginAdminBtn">Login to Dashboard</button><div class="footer-note" style="margin-top:18px;">Demo: <strong>store123</strong><br>📱 Customer portal available after login</div></div>`;
    }

    function renderAdminDashboard() {
        if (!adminLoggedIn) return renderAdminLogin();
        const totalOutstanding = customers.reduce((s,c)=> s+getTotalDebt(c.id),0);
        const selected = customers.find(c=>c.id === selectedCustomerId);
        const selectedOrders = selected ? getCustomerOrders(selected.id) : [];
        const selectedPayments = selected ? getCustomerPayments(selected.id) : [];
        const debt = selected ? getTotalDebt(selected.id) : 0;
        const limitReached = selected ? isCreditLimitReached(selected.id) : false;
        const remainingCredit = selected ? getRemainingCredit(selected.id) : 0;
        const loyalty = selected ? (getOrderCount(selected.id) >= 5 ? { eligible: true, msg: "🎁 Loyalty Reward: Free coffee or 10% off!" } : { eligible: false, msg: `${5-getOrderCount(selected.id)} more orders for gift` }) : null;

        return `
        <div class="header"><div class="logo"><h1>📄 Living Invoice • WhatsApp Ledger</h1><p>Auto-updating invoice per customer</p></div><div class="nav-buttons"><button class="btn btn-outline" id="settingsBtn">⚙️ Settings</button><button class="btn btn-outline" id="switchToCustomerPortalBtn">👤 Customer Portal</button><button class="btn btn-danger" id="adminLogoutBtn">Logout</button></div></div>
        <div class="stats-grid"><div class="stat-card"><strong>💰 Total Outstanding</strong><br><span style="font-size:1.6rem;">$${totalOutstanding.toFixed(2)}</span></div><div class="stat-card"><strong>👥 Active Customers</strong><br>${customers.length}</div><div class="stat-card"><strong>📦 Open Credit Lines</strong><br>${customers.filter(c=>getTotalDebt(c.id)>0).length}</div></div>
        <div class="flex-row"><div class="customer-sidebar card"><h3>👥 Customers</h3><input type="text" id="customerSearch" class="search-box" placeholder="Search name / phone..."><button class="btn btn-primary small" id="addCustomerBtn" style="width:100%; margin-bottom:14px;">+ New Customer</button><div class="customer-list" id="customerListContainer">${customers.map(c => { const debtC = getTotalDebt(c.id); const activeClass = selectedCustomerId === c.id ? 'active' : ''; return `<div class="customer-item ${activeClass}" data-cust-id="${c.id}"><div class="customer-info"><strong>${escapeHtml(c.name)}</strong><br><span style="font-size:0.7rem;">${c.phone || '—'} | Limit $${c.creditLimit}</span><div class="debt-highlight">$${debtC.toFixed(2)}</div></div></div>`; }).join('')}</div><div class="footer-note">⭐ Tiered: $29/mo ≤50 active · $49/mo 50+</div></div>
        <div class="customer-detail card">${selected ? `
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; align-items:center;"><div><h2>${escapeHtml(selected.name)} <span class="badge">${selected.phone || 'no phone'}</span></h2><div><span class="badge">💳 Credit Limit: $${selected.creditLimit}</span> <span class="badge">Remaining: $${remainingCredit.toFixed(2)}</span></div></div><div><button class="btn btn-outline small" id="editCustomerBtn">✏️ Edit Customer</button> <button class="btn btn-danger small" id="deleteCustomerBtn">🗑 Delete</button></div></div>
            ${limitReached ? `<div class="credit-warning gift-message">⚠️ CREDIT LIMIT REACHED! No new orders until payment is made. Current debt: $${debt.toFixed(2)} / Limit $${selected.creditLimit}</div>` : `<div class="pay-early">💡 ${debt>0 ? "Pay early to free credit and avoid interruption" : "No outstanding balance – ready for new orders"}</div>`}
            <div class="stats-grid" style="margin:10px 0"><div class="stat-card"><strong>💸 Current Debt</strong><br><span style="font-size:1.8rem;">$${debt.toFixed(2)}</span></div><div class="stat-card"><strong>🛒 Orders</strong><br>${getOrderCount(selected.id)}</div><div class="stat-card"><strong>🎁 Loyalty</strong><br>${loyalty.msg}</div></div>
            <div class="flex-btns"><button id="pdfInvoiceBtn" class="btn btn-primary">📄 PDF Invoice</button><button id="excelExportBtn" class="btn btn-outline">📎 Excel (CSV)</button><button id="whatsappShareBtn" class="btn whatsapp-btn">📱 Send Invoice via WhatsApp</button><button id="sendPortalLinkBtn" class="btn btn-outline">🔗 Send Portal Link (Live Invoice)</button><button id="quickOrderWhatsAppBtn" class="btn btn-outline">🛒 Quick WhatsApp Order</button></div>
            <hr><h3>➕ Add WhatsApp Order (Auto updates invoice)</h3>
            <div style="display:flex; gap:12px; flex-wrap:wrap;"><div style="flex:2"><input type="number" id="orderAmount" placeholder="Amount $" step="0.01"></div><div style="flex:3"><input type="text" id="orderDesc" placeholder="Item description (coffee, bread..)"></div><div><button class="btn btn-primary" id="addOrderBtn" ${limitReached ? 'disabled style="opacity:0.5;"' : ''}>➕ Add Order</button></div></div>
            <h3>💵 Record Payment</h3><div style="display:flex; gap:12px;"><div style="flex:2"><input type="number" id="paymentAmount" placeholder="Amount $" step="0.01"></div><div style="flex:3"><input type="text" id="paymentNote" placeholder="Cash / UPI / Bank"></div><div><button class="btn btn-primary" id="addPaymentBtn">💰 Add Payment</button></div></div>
            <hr><h3>📋 Order History (Unpaid items increase tab)</h3><div id="orderHistoryList">${selectedOrders.map(o => `<div class="order-row"><div><strong>$${o.amount.toFixed(2)}</strong> - ${escapeHtml(o.description)}<br><span style="font-size:0.7rem;">${new Date(o.date).toLocaleString()}</span></div><div><button class="small btn-danger" data-order-id="${o.id}" data-action="deleteOrder">🗑</button></div></div>`).join('')}</div>
            <h3>🧾 Payment History</h3><div id="paymentHistoryList">${selectedPayments.map(p => `<div class="payment-row"><div><strong>$${p.amount.toFixed(2)}</strong> - ${escapeHtml(p.note)}<br><span style="font-size:0.7rem;">${new Date(p.date).toLocaleString()}</span></div><div><button class="small btn-danger" data-payment-id="${p.id}" data-action="deletePayment">🗑</button></div></div>`).join('')}</div>
        ` : `<div style="text-align:center;padding: 40px;">👈 Select a customer → Living invoice updates per order. PDF/Excel & WhatsApp share ready.</div>`}</div></div>`;
    }

    function attachAdminEvents() {
        document.querySelectorAll('.customer-item').forEach(el => { el.addEventListener('click', (e) => { const id = parseInt(el.dataset.custId); if(id) { selectedCustomerId = id; renderRoot(); } }); });
        document.getElementById('addCustomerBtn')?.addEventListener('click', () => { 
            let name = prompt("Full name:"); 
            if(name) { 
                let phone = prompt("Phone number (for customer portal & WhatsApp):"); 
                let limit = prompt("Credit limit (USD)", "100"); 
                addCustomer(name, phone, parseFloat(limit) || 100); 
                renderRoot(); 
            } 
        });
        document.getElementById('deleteCustomerBtn')?.addEventListener('click', () => { if(selectedCustomerId && deleteCustomer(selectedCustomerId)) renderRoot(); });
        document.getElementById('editCustomerBtn')?.addEventListener('click', () => {
            if(selectedCustomerId) {
                const cust = customers.find(c => c.id === selectedCustomerId);
                if(cust) {
                    let newName = prompt("Edit name:", cust.name);
                    if(newName !== null && newName.trim() !== "") {
                        let newPhone = prompt("Edit phone number (for WhatsApp):", cust.phone);
                        let newLimit = prompt("Edit credit limit (USD):", cust.creditLimit);
                        if(newLimit && !isNaN(parseFloat(newLimit))) {
                            updateCustomer(selectedCustomerId, newName, newPhone, parseFloat(newLimit));
                            renderRoot();
                        } else alert("Invalid credit limit");
                    }
                }
            }
        });
        document.getElementById('settingsBtn')?.addEventListener('click', () => {
            let newNumber = prompt("Enter your store WhatsApp number (with country code, e.g., +1234567890):", storeWhatsAppNumber);
            if(newNumber !== null) {
                storeWhatsAppNumber = newNumber.trim();
                saveAllData();
                alert(`Store number saved: ${storeWhatsAppNumber || 'not set'}`);
            }
        });
        document.getElementById('addOrderBtn')?.addEventListener('click', () => { if(selectedCustomerId && !isCreditLimitReached(selectedCustomerId)) { const amt = document.getElementById('orderAmount')?.value; const desc = document.getElementById('orderDesc')?.value; if(amt && parseFloat(amt)>0) { addOrder(selectedCustomerId, parseFloat(amt), desc); renderRoot(); } else alert("Enter valid amount"); } else if(selectedCustomerId && isCreditLimitReached(selectedCustomerId)) alert("Credit limit reached. Cannot add order."); });
        document.getElementById('addPaymentBtn')?.addEventListener('click', () => { const amt = document.getElementById('paymentAmount')?.value; const note = document.getElementById('paymentNote')?.value; if(amt && parseFloat(amt)>0 && selectedCustomerId) { addPayment(selectedCustomerId, parseFloat(amt), note); renderRoot(); } });
        document.getElementById('pdfInvoiceBtn')?.addEventListener('click', () => { const cust = customers.find(c=>c.id === selectedCustomerId); if(cust) generatePDFInvoice(cust); });
        document.getElementById('excelExportBtn')?.addEventListener('click', () => { const cust = customers.find(c=>c.id === selectedCustomerId); if(cust) exportCustomerExcel(cust); });
        document.getElementById('whatsappShareBtn')?.addEventListener('click', () => { const cust = customers.find(c=>c.id === selectedCustomerId); if(cust) shareInvoiceViaWhatsApp(cust); });
        document.getElementById('sendPortalLinkBtn')?.addEventListener('click', () => { const cust = customers.find(c=>c.id === selectedCustomerId); if(cust) sendPortalLink(cust); });
        document.getElementById('quickOrderWhatsAppBtn')?.addEventListener('click', () => { const cust = customers.find(c=>c.id === selectedCustomerId); if(cust) quickWhatsAppOrder(cust); });
        
        document.querySelectorAll('[data-action="deleteOrder"]').forEach(btn => { btn.onclick = () => { const orderId = parseInt(btn.dataset.orderId); if(orderId && deleteOrder(orderId, selectedCustomerId)) renderRoot(); }; });
        document.querySelectorAll('[data-action="deletePayment"]').forEach(btn => { btn.onclick = () => { const pid = parseInt(btn.dataset.paymentId); if(pid && deletePayment(pid)) renderRoot(); }; });
        
        const searchInput = document.getElementById('customerSearch');
        if(searchInput) searchInput.addEventListener('input', (e) => { const term = e.target.value.toLowerCase(); document.querySelectorAll('.customer-item').forEach(it => { it.style.display = it.innerText.toLowerCase().includes(term) ? 'flex' : 'none'; }); });
    }

    function renderCustomerPortal() {
        // check URL query param for auto-load
        const urlParams = new URLSearchParams(window.location.search);
        const autoPhone = urlParams.get('phone');
        return `<div class="header"><div class="logo"><h1>🧾 Your Living Invoice</h1><p>Track debt, orders & payments real-time</p></div><div class="nav-buttons"><button class="btn btn-primary" id="backToAdminFromPortalBtn">🔐 Store Login</button></div></div>
        <div class="card" style="max-width:700px;margin:0 auto;"><h2>📱 Customer Portal</h2><p>Enter your phone number to see your auto‑updated invoice (orders + payments). Bookmark this page after login.</p><div class="form-group"><label>📞 Phone Number</label><input type="text" id="portalPhone" placeholder="e.g., +1234567890" class="search-box" value="${autoPhone ? escapeHtml(autoPhone) : ''}"></div><button class="btn btn-primary" id="portalLookupBtn">View My Invoice</button><div id="portalResult" style="margin-top:24px;"></div></div><div class="footer-note">✅ Each order updates your invoice instantly. Pay early to reduce debt.</div>`;
    }
    
    function showCustomerPortalData(phone) {
        const customer = customers.find(c => c.phone === phone.trim());
        const container = document.getElementById("portalResult");
        if(!customer) { container.innerHTML = `<div class="card" style="background:#fff0f0;">❌ No account found for ${escapeHtml(phone)}. Contact store.</div>`; return; }
        const ordersList = getCustomerOrders(customer.id);
        const paymentsList = getCustomerPayments(customer.id);
        const debt = getTotalDebt(customer.id);
        const limit = customer.creditLimit;
        const remaining = limit - debt;
        container.innerHTML = `<div class="card"><h3>🧾 LIVING INVOICE · ${escapeHtml(customer.name)}</h3><div class="stats-grid"><div class="stat-card"><strong>Due Now</strong><br>$${debt.toFixed(2)}</div><div class="stat-card"><strong>Credit Limit</strong><br>$${limit}</div><div class="stat-card"><strong>Remaining</strong><br>$${remaining.toFixed(2)}</div></div><div class="pay-early">${debt>0 ? "💸 Pay early to unlock more credit" : "✅ All paid. Thank you!"}</div><hr><h4>📦 Unpaid items & orders</h4>${ordersList.map(o=>`<div class="order-row"><div><strong>$${o.amount.toFixed(2)}</strong> - ${escapeHtml(o.description)}<br><span style="font-size:0.7rem;">${new Date(o.date).toLocaleString()}</span></div></div>`).join('')}<h4>💵 Payments made</h4>${paymentsList.map(p=>`<div class="payment-row"><div>$${p.amount.toFixed(2)} - ${escapeHtml(p.note)}<br><span style="font-size:0.7rem;">${new Date(p.date).toLocaleString()}</span></div></div>`).join('')}<div class="footer-note">📄 This invoice updates automatically after each order/payment. Bookmark this page to always see your latest balance.</div></div>`;
    }

    function renderRoot() {
        if(currentView === "customerPortal") {
            root.innerHTML = renderCustomerPortal();
            document.getElementById('backToAdminFromPortalBtn')?.addEventListener('click', ()=>{ currentView = "admin"; renderRoot(); });
            document.getElementById('portalLookupBtn')?.addEventListener('click', ()=>{ const phone = document.getElementById('portalPhone')?.value; if(phone) showCustomerPortalData(phone); else alert("Enter phone number"); });
            // auto-load if phone in URL
            const urlPhone = new URLSearchParams(window.location.search).get('phone');
            if(urlPhone && document.getElementById('portalPhone')) {
                document.getElementById('portalPhone').value = urlPhone;
                showCustomerPortalData(urlPhone);
            }
        } else {
            root.innerHTML = renderAdminDashboard();
            if(!adminLoggedIn) {
                document.getElementById('loginAdminBtn')?.addEventListener('click', ()=>{ if(document.getElementById('adminPassword')?.value === "store123") { adminLoggedIn=true; renderRoot(); } else alert("Wrong pass: store123"); });
            } else {
                document.getElementById('switchToCustomerPortalBtn')?.addEventListener('click', ()=>{ currentView = "customerPortal"; renderRoot(); });
                document.getElementById('adminLogoutBtn')?.addEventListener('click', ()=>{ adminLoggedIn=false; selectedCustomerId=null; renderRoot(); });
                attachAdminEvents();
            }
        }
    }
    loadData();
    renderRoot();
</script>
</body>
</html>
